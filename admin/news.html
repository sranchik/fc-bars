<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление новостями | Админ-панель ФК Барс</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; }
        .admin-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { color: #1e3a5f; }
        .btn { padding: 10px 24px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: #1e3a5f; color: white; }
        .btn-primary:hover { background: #0f2b4a; }
        .btn-delete { background: #dc3545; color: white; padding: 6px 16px; font-size: 12px; }
        .nav-links { margin-bottom: 20px; }
        .nav-links a { margin-right: 20px; color: #1e3a5f; text-decoration: none; }
        table { width: 100%; background: white; border-radius: 20px; overflow: hidden; border-collapse: collapse; }
        th { background: #1e3a5f; color: white; padding: 15px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 24px; width: 90%; max-width: 600px; }
        .modal-content h2 { margin-bottom: 20px; color: #1e3a5f; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 12px; font-family: inherit; }
        .form-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .news-image-preview { max-width: 80px; max-height: 50px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="nav-links">
            <a href="index.html">🏠 Главная</a>
            <a href="players.html">⚽ Игроки</a>
            <a href="news.html" style="font-weight: bold;">📰 Новости</a>
            <a href="matches.html">📅 Матчи</a>
            <a href="messages.html">✉️ Сообщения</a>
            <a href="#" id="logoutLink">🚪 Выход</a>
        </div>

        <div class="admin-header">
            <h1>📰 Управление новостями</h1>
            <button class="btn btn-primary" onclick="openAddModal()">➕ Добавить новость</button>
        </div>

        <table>
            <thead>
                <tr><th>ID</th><th>Картинка</th><th>Заголовок</th><th>Текст</th><th>Дата</th><th>Действия</th></tr>
            </thead>
            <tbody id="newsTableBody">
                <tr><td colspan="6" style="text-align:center;">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Модальное окно -->
    <div id="newsModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">➕ Добавить новость</h2>
            <div class="form-group">
                <label>Заголовок</label>
                <input type="text" id="title" placeholder="Заголовок новости">
            </div>
            <div class="form-group">
                <label>Текст новости</label>
                <textarea id="content" rows="6" placeholder="Полный текст новости..."></textarea>
            </div>
            <div class="form-group">
                <label>URL картинки</label>
                <input type="text" id="image_url" placeholder="https://example.com/image.jpg">
            </div>
            <div class="form-buttons">
                <button class="btn" style="background:#ccc" onclick="closeModal()">Отмена</button>
                <button class="btn btn-primary" onclick="saveNews()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://8888888.pythonanywhere.com/api';
        
        // Проверка авторизации
        if (!sessionStorage.getItem('admin_logged_in')) {
            window.location.href = 'login.html';
        }
        
        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        });

        async function loadNews() {
            try {
                const response = await fetch(`${API_URL}/news`);
                const news = await response.json();
                const tbody = document.getElementById('newsTableBody');
                
                if (!news.length) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Нет новостей. Добавьте первую!</td></tr>';
                    return;
                }
                
                tbody.innerHTML = news.map(n => `
                    <tr>
                        <td>${n.id}</td>
                        <td>${n.image_url ? `<img src="${n.image_url}" class="news-image-preview" onerror="this.style.display='none'">` : '—'}</td>
                        <td><strong>${escapeHtml(n.title)}</strong></td>
                        <td>${escapeHtml(n.content.substring(0, 100))}${n.content.length > 100 ? '...' : ''}</td>
                        <td>${new Date(n.date).toLocaleDateString()}</td>
                        <td><button class="btn-delete" onclick="deleteNews(${n.id})">🗑️ Удалить</button></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
                document.getElementById('newsTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;">❌ Ошибка подключения к серверу</td></tr>';
            }
        }

        async function saveNews() {
            const news = {
                title: document.getElementById('title').value.trim(),
                content: document.getElementById('content').value.trim(),
                image_url: document.getElementById('image_url').value.trim()
            };
            
            if (!news.title) {
                alert('Введите заголовок!');
                return;
            }
            if (!news.content) {
                alert('Введите текст новости!');
                return;
            }
            
            try {
                await fetch(`${API_URL}/news`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(news)
                });
                closeModal();
                loadNews();
                alert(' Новость добавлена!');
            } catch (error) {
                alert(' Ошибка сохранения');
            }
        }

        async function deleteNews(id) {
            if (!confirm('Удалить эту новость навсегда?')) return;
            try {
                await fetch(`${API_URL}/news/${id}`, { method: 'DELETE' });
                loadNews();
                alert(' Новость удалена');
            } catch (error) {
                alert('Ошибка удаления');
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function openAddModal() {
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('image_url').value = '';
            document.getElementById('modalTitle').innerText = ' Добавить новость';
            document.getElementById('newsModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('newsModal').style.display = 'none';
        }

        loadNews();
    </script>
</body>
</html>
