<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление игроками | Админ-панель ФК Барс</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #f0f2f5;
        }
        .admin-container {
            max-width: 1300px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 {
            color: #1e3a5f;
            font-size: 28px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .btn-primary {
            background: #1e3a5f;
            color: white;
        }
        .btn-primary:hover {
            background: #0f2b4a;
        }
        .btn-edit {
            background: #ffc107;
            color: #1e1e2a;
            margin-right: 8px;
        }
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        .btn-save {
            background: #28a745;
            color: white;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-collapse: collapse;
        }
        th {
            background: #1e3a5f;
            color: white;
            padding: 15px 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }
        .player-photo {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50%;
            background: #eef2f7;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
        }
        .modal-content h2 {
            margin-bottom: 20px;
            color: #1e3a5f;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 12px;
        }
        .form-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .nav-links {
            margin-bottom: 20px;
        }
        .nav-links a {
            margin-right: 20px;
            color: #1e3a5f;
            text-decoration: none;
        }
        .status-ok {
            color: green;
            font-size: 12px;
            margin-left: 10px;
        }
        .status-error {
            color: red;
            font-size: 12px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="nav-links">
            <a href="index.html">🏠 Главная</a>
            <a href="players.html" style="font-weight: bold;">⚽ Игроки</a>
            <a href="news.html">📰 Новости</a>
            <a href="matches.html">📅 Матчи</a>
            <a href="messages.html">✉️ Сообщения</a>
            <a href="#" id="logoutLink">🚪 Выход</a>
        </div>

        <div class="admin-header">
            <h1>⚽ Управление игроками</h1>
            <button class="btn btn-primary" onclick="openAddModal()">➕ Добавить игрока</button>
        </div>

        <div style="overflow-x: auto;">
            <table id="playersTable">
                <thead>
                    <tr><th>№</th><th>Фото</th><th>Имя</th><th>Позиция</th><th>Возраст</th><th>Страна</th><th>Голы</th><th>Действия</th></tr>
                </thead>
                <tbody id="playersTableBody">
                    <tr><td colspan="8" style="text-align:center;">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="playerModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">➕ Добавить игрока</h2>
            <form id="playerForm">
                <div class="form-group"><label>Номер *</label><input type="number" id="number" required></div>
                <div class="form-group"><label>Имя *</label><input type="text" id="name" required></div>
                <div class="form-group"><label>Позиция</label>
                    <select id="position">
                        <option>Вратарь</option><option>Защитник</option>
                        <option>Полузащитник</option><option>Нападающий</option>
                    </select>
                </div>
                <div class="form-group"><label>Возраст</label><input type="number" id="age"></div>
                <div class="form-group"><label>Гражданство</label><input type="text" id="nationality" placeholder="Кыргызстан"></div>
                <div class="form-group"><label>URL фото</label><input type="text" id="photo_url" placeholder="https://..."></div>
                <div class="form-group"><label>⚽ Голов</label><input type="number" id="goals" value="0"></div>
                <input type="hidden" id="editId" value="">
            </form>
            <div class="form-buttons">
                <button class="btn" style="background:#ccc" onclick="closeModal()">Отмена</button>
                <button class="btn btn-save" onclick="savePlayer()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://8888888.pythonanywhere.com/api';

        // Проверка авторизации
        if (!sessionStorage.getItem('admin_logged_in')) {
            window.location.href = 'login.html';
        }

        // Выход
        document.getElementById('logoutLink').addEventListener('click', function(e) {
            e.preventDefault();
            sessionStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        });

        // Загрузка игроков
        async function loadPlayers() {
            try {
                const response = await fetch(`${API_URL}/players`);
                if (!response.ok) throw new Error('Сервер не отвечает');
                const players = await response.json();
                
                const tbody = document.getElementById('playersTableBody');
                if (players.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Нет игроков. Добавьте первого!</td></tr>';
                    return;
                }
                
                tbody.innerHTML = players.map(p => `
                    <tr>
                        <td><strong>${p.number}</strong></td>
                        <td>${p.photo_url ? `<img src="${p.photo_url}" class="player-photo" onerror="this.src=''">` : '—'}</td>
                        <td>${p.name}</td>
                        <td>${p.position}</td>
                        <td>${p.age || '—'}</td>
                        <td>${p.nationality || '—'}</td>
                        <td>⚽ ${p.goals || 0}</td>
                        <td>
                            <button class="btn btn-edit" onclick="editPlayer(${p.id})">✏️</button>
                            <button class="btn btn-delete" onclick="deletePlayer(${p.id})">🗑️</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error(error);
                document.getElementById('playersTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center;color:red;">❌ Ошибка подключения к серверу. Запустите сервер: python server/app.py</td></tr>';
            }
        }

        // Сохранение (добавление или редактирование)
        async function savePlayer() {
            const player = {
                number: parseInt(document.getElementById('number').value),
                name: document.getElementById('name').value.trim(),
                position: document.getElementById('position').value,
                age: parseInt(document.getElementById('age').value) || null,
                nationality: document.getElementById('nationality').value,
                photo_url: document.getElementById('photo_url').value,
                goals: parseInt(document.getElementById('goals').value) || 0
            };

            if (!player.name || !player.number) {
                alert('Заполните имя и номер!');
                return;
            }

            const editId = document.getElementById('editId').value;
            const url = editId ? `${API_URL}/players/${editId}` : `${API_URL}/players`;
            const method = editId ? 'PUT' : 'POST';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(player)
                });
                
                if (response.ok) {
                    alert(editId ? 'Игрок обновлён!' : 'Игрок добавлен!');
                    closeModal();
                    loadPlayers();
                } else {
                    alert('Ошибка сохранения');
                }
            } catch (error) {
                alert('Ошибка подключения к серверу');
            }
        }

        // Редактирование
        async function editPlayer(id) {
            try {
                const response = await fetch(`${API_URL}/players`);
                const players = await response.json();
                const p = players.find(x => x.id === id);
                if (!p) return;

                document.getElementById('editId').value = p.id;
                document.getElementById('number').value = p.number;
                document.getElementById('name').value = p.name;
                document.getElementById('position').value = p.position;
                document.getElementById('age').value = p.age || '';
                document.getElementById('nationality').value = p.nationality || '';
                document.getElementById('photo_url').value = p.photo_url || '';
                document.getElementById('goals').value = p.goals || 0;
                document.getElementById('modalTitle').innerText = '✏️ Редактировать игрока';
                document.getElementById('playerModal').style.display = 'flex';
            } catch (error) {
                alert('Ошибка загрузки игрока');
            }
        }

        // Удаление
        async function deletePlayer(id) {
            if (!confirm('Удалить игрока навсегда?')) return;
            try {
                await fetch(`${API_URL}/players/${id}`, { method: 'DELETE' });
                loadPlayers();
            } catch (error) {
                alert('Ошибка удаления');
            }
        }

        function openAddModal() {
            document.getElementById('playerForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('modalTitle').innerText = '➕ Добавить игрока';
            document.getElementById('playerModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('playerModal').style.display = 'none';
        }

        // Загрузка при открытии страницы
        loadPlayers();
    </script>
</body>
</html>
