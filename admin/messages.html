<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения | Админ-панель ФК Барс</title>
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; }
        .admin-container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: #1e3a5f; }
        .nav-links { margin-bottom: 20px; }
        .nav-links a { margin-right: 20px; color: #1e3a5f; text-decoration: none; }
        .btn-delete { background: #dc3545; color: white; padding: 6px 16px; border: none; border-radius: 8px; cursor: pointer; }
        table { width: 100%; background: white; border-radius: 20px; overflow: hidden; border-collapse: collapse; }
        th { background: #1e3a5f; color: white; padding: 15px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: top; }
        .message-content { max-width: 400px; word-wrap: break-word; }
        .badge-new { background: #28a745; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
        .badge-read { background: #6c757d; color: white; padding: 4px 10px; border-radius: 20px; font-size: 11px; }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="nav-links">
            <a href="index.html">🏠 Главная</a>
            <a href="players.html">⚽ Игроки</a>
            <a href="news.html">📰 Новости</a>
            <a href="matches.html">📅 Матчи</a>
            <a href="messages.html" style="font-weight: bold;">✉️ Сообщения</a>
            <a href="#" id="logoutLink">🚪 Выход</a>
        </div>

        <div class="admin-header">
            <h1>✉️ Сообщения с сайта</h1>
        </div>

        <table>
            <thead>
                <tr><th>ID</th><th>Отправитель</th><th>Email</th><th>Сообщение</th><th>Дата</th><th>Действия</th></tr>
            </thead>
            <tbody id="messagesTableBody">
                <tr><td colspan="6" style="text-align:center;">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // API URL для облачного сервера
        const API_URL = 'https://8888888.pythonanywhere.com/api';
        
        // Проверка авторизации
        if (!sessionStorage.getItem('admin_logged_in')) {
            window.location.href = 'login.html';
        }
        
        // Выход
        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            sessionStorage.removeItem('admin_logged_in');
            window.location.href = 'login.html';
        });

        // Загрузка сообщений
        async function loadMessages() {
            try {
                const response = await fetch(`${API_URL}/messages`);
                const messages = await response.json();
                const tbody = document.getElementById('messagesTableBody');
                
                if (!messages.length) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Нет сообщений</td></tr>';
                    return;
                }
                
                tbody.innerHTML = messages.map(m => `
                    <tr>
                        <td>${m.id}</td>
                        <td><strong>${escapeHtml(m.name)}</strong></td>
                        <td>${escapeHtml(m.email)}</td>
                        <td class="message-content">${escapeHtml(m.message)}</td>
                        <td>${new Date(m.date).toLocaleString()}</td>
                        <td><button class="btn-delete" onclick="deleteMessage(${m.id})">🗑️ Удалить</button></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Ошибка загрузки сообщений:', error);
                document.getElementById('messagesTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;">❌ Ошибка подключения к серверу</td></tr>';
            }
        }

        // Удаление сообщения
        async function deleteMessage(id) {
            if (!confirm('Удалить это сообщение?')) return;
            try {
                await fetch(`${API_URL}/messages/${id}`, { method: 'DELETE' });
                loadMessages();
                alert('✅ Сообщение удалено');
            } catch (error) {
                alert('❌ Ошибка удаления');
            }
        }
        
        // Защита от XSS
        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Загружаем сообщения при открытии страницы
        loadMessages();
    </script>
</body>
</html>
